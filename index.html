<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <title>Recovery Quest</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #ff4757;
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --success: #2ed573;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .progress-container {
            width: 100%;
            background: #2f3542;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .step-time {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .step-title {
            font-size: 22px;
            margin-bottom: 16px;
        }

        .step-desc {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        ul.food-list {
            list-style: none;
            margin-bottom: 24px;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 12px;
        }

        ul.food-list li {
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid #333;
        }
        ul.food-list li:last-child { border-bottom: none; }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, background 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .done-state {
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }

        .done-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .reset-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
            margin-top: 20px;
            padding: 10px;
            font-size: 12px;
        }
        
        cite {
            font-size: 10px;
            opacity: 0.5;
            text-decoration: none;
            font-style: normal;
        }
    </style>
</head>
<body>

    <header>
        <h1>Recovery Quest</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="status-text" id="status">Шаг 0 / 9</div>
    </header>

    <div id="quest-container">
        </div>

    <div class="done-state" id="done-state">
        <div class="done-icon">🧬</div>
        <h2 style="margin-bottom: 10px;">День уничтожен!</h2>
        <p style="color: var(--text-muted); font-size: 14px; text-align: center;">Творог усваивается, билирубин в норме, ЦНС отдыхает.</p>
        <button class="btn reset-btn" onclick="resetQuest()">Начать новый день</button>
    </div>

    <script>
        const questData = [
            {
                time: "07:30 - 08:15",
                title: "Пробуждение & Свет",
                desc: "Вставай в одно время <cite>[cite: 98]</cite>. Сразу иди к окну или на улицу на 10-15 минут ловить свет <cite>[cite: 100]</cite>. Это подавит мелатонин и даст сигнал кортизолу <cite>[cite: 101]</cite>.",
                list: [],
                btnText: "Свет пойман 👁️"
            },
            {
                time: "08:00 - 09:00",
                title: "Завтрак (~600 ккал)",
                desc: "Жиры — ключ к нейростероидам и снижению тревоги <cite>[cite: 6]</cite>. Не пропускай!",
                list: [
                    "Овсянка (сухая) — 80 г <cite>[cite: 10]</cite>",
                    "Яйца куриные — 2 шт <cite>[cite: 11]</cite>",
                    "Греческий йогурт — 100 г (против H.pylori) <cite>[cite: 13]</cite>",
                    "Подсолнечное масло — 10 мл <cite>[cite: 14]</cite>"
                ],
                btnText: "Я поел 🥣"
            },
            {
                time: "11:00 - 11:30",
                title: "Перекус 1 (~350 ккал)",
                desc: "Правило Жильбера: не голодать >4 часов вообще никогда <cite>[cite: 7]</cite>.",
                list: [
                    "Творог 5-9% — 150 г <cite>[cite: 16, 17]</cite>",
                    "Хлеб серый — 2 ломтя <cite>[cite: 18]</cite>",
                    "Семечки — 20 г (Магний!) <cite>[cite: 19]</cite>"
                ],
                btnText: "Зарядился 🔋"
            },
            {
                time: "14:00 - 14:30",
                title: "Обед (~700 ккал)",
                desc: "Плюс обязательно добавь обычную брокколи (100-150г) от H.pylori <cite>[cite: 90, 92]</cite>.",
                list: [
                    "Гречка (100г сухого) <cite>[cite: 22]</cite> ИЛИ Чечевица (80г) + Рис (60г) <cite>[cite: 27, 28]</cite>",
                    "Куриное филе — 120 г <cite>[cite: 23]</cite>",
                    "Масло (15 мл) + Морковь/лук (80г) <cite>[cite: 24, 25]</cite>"
                ],
                btnText: "Обед уничтожен 🍗"
            },
            {
                time: "17:00 - 17:30",
                title: "Перекус 2 (~350 ккал)",
                desc: "Добиваем калории и закидываем вторую порцию пробиотиков <cite>[cite: 34]</cite>.",
                list: [
                    "Греческий йогурт — 150 г <cite>[cite: 33]</cite>",
                    "Банан — 1 шт <cite>[cite: 35]</cite>",
                    "Хлеб (30г) + Масло (10мл) <cite>[cite: 36]</cite>"
                ],
                btnText: "Сделано 🍌"
            },
            {
                time: "Вечер",
                title: "Активность & ШОП",
                desc: "Сделай Chin tuck (3 подхода по 10 раз) для декомпрессии ПА <cite>[cite: 87, 88]</cite>. Пн/Чт/Сб — легкий зал <cite>[cite: 66, 68, 69]</cite>, Вт/Пт — бассейн <cite>[cite: 67, 89]</cite>, Вс — отдых и баня <cite>[cite: 70]</cite>.",
                list: [],
                btnText: "Отработал 🏋️‍♂️"
            },
            {
                time: "20:00 - 20:30",
                title: "Ужин (~550 ккал)",
                desc: "Творог на ночь = антибилирубиновый щит. Организм не голодает ночью <cite>[cite: 136, 137]</cite>.",
                list: [
                    "Гречка или рис — 70 г <cite>[cite: 38, 39]</cite>",
                    "Яйца куриные — 2 шт <cite>[cite: 40]</cite>",
                    "Творог 5-9% — 100 г <cite>[cite: 41]</cite>",
                    "Подсолнечное масло — 5 мл <cite>[cite: 42]</cite>"
                ],
                btnText: "Съел 🍽️"
            },
            {
                time: "21:00",
                title: "Цифровой Детокс",
                desc: "Синий свет подавляет мелатонин на 2-3 часа <cite>[cite: 103]</cite>. Убирай телефон, врубай режим ночного света на ПК <cite>[cite: 102]</cite>.",
                list: [],
                btnText: "Экраны офф 📵"
            },
            {
                time: "23:00 - 23:30",
                title: "Сон",
                desc: "Дыши 4-7-8 <cite>[cite: 106]</cite>. Сделай релаксацию по Якобсону (снимет спазм tensor tympani) <cite>[cite: 111]</cite>. Ложись спать на левый бок (уменьшает желчный рефлюкс) <cite>[cite: 108, 109]</cite>.",
                list: [],
                btnText: "Ушёл в спящий режим 💤"
            }
        ];

        let currentStep = parseInt(localStorage.getItem('recoveryQuestStep')) || 0;
        const container = document.getElementById('quest-container');
        const doneState = document.getElementById('done-state');
        const progressBar = document.getElementById('progress');
        const statusText = document.getElementById('status');

        function renderStep() {
            if (currentStep >= questData.length) {
                container.style.display = 'none';
                doneState.style.display = 'flex';
                updateProgress();
                return;
            }

            container.style.display = 'block';
            doneState.style.display = 'none';
            const data = questData[currentStep];
            
            let listHTML = '';
            if (data.list.length > 0) {
                listHTML = `<ul class="food-list">
                    ${data.list.map(item => `<li>${item}</li>`).join('')}
                </ul>`;
            }

            container.innerHTML = `
                <div class="card" id="current-card">
                    <div class="step-time">${data.time}</div>
                    <h2 class="step-title">${data.title}</h2>
                    <p class="step-desc">${data.desc}</p>
                    ${listHTML}
                    <button class="btn" onclick="nextStep()">${data.btnText}</button>
                </div>
            `;
            updateProgress();
        }

        function nextStep() {
            currentStep++;
            localStorage.setItem('recoveryQuestStep', currentStep);
            
            // Анимация ухода старой карточки
            const card = document.getElementById('current-card');
            if(card) {
                card.style.transform = 'scale(0.95)';
                card.style.opacity = '0';
                setTimeout(() => {
                    renderStep();
                }, 200);
            } else {
                renderStep();
            }
        }

        function resetQuest() {
            currentStep = 0;
            localStorage.setItem('recoveryQuestStep', 0);
            renderStep();
        }

        function updateProgress() {
            const total = questData.length;
            const percent = (currentStep / total) * 100;
            progressBar.style.width = percent + '%';
            statusText.innerText = `Шаг ${currentStep} / ${total}`;
        }

        // Init
        renderStep();
    </script>
</body>
</html>
