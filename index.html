<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>SYSTEM</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #111112;
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #6e6e73;
            --accent: #ffffff;
            --success: #32d74b;
            --rad: 20px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif; 
        }
        
        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; 
            padding-top: max(env(safe-area-inset-top), 40px);
            padding-bottom: max(env(safe-area-inset-bottom), 40px);
            font-variant-numeric: tabular-nums;
        }

        /* Ambient Aura Background */
        .ambient-aura {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            width: 80vw; height: 80vw; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px); z-index: 0; pointer-events: none;
            transition: background 2s ease;
        }
        .ambient-aura.completed {
            background: radial-gradient(circle, rgba(50,215,75,0.05) 0%, rgba(0,0,0,0) 70%);
        }

        .container {
            position: relative; z-index: 1; width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* Minimal Cards */
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--rad); padding: 24px;
        }

        /* Typography */
        .label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); font-weight: 600; margin-bottom: 8px; display: block;
        }
        
        .level-block { text-align: center; padding: 10px 0 20px 0; }
        .level-number {
            font-size: 88px; font-weight: 200; letter-spacing: -3px; line-height: 1;
            color: var(--text-main);
        }
        .level-subtitle {
            font-size: 14px; color: var(--text-muted); font-weight: 400; margin-top: 8px;
        }

        /* Init Button */
        .btn-init {
            background: var(--text-main); color: var(--bg); border: none;
            width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-init:active { transform: scale(0.97); opacity: 0.8; }
        .btn-init.active {
            background: rgba(255, 255, 255, 0.05); color: var(--text-muted); pointer-events: none;
        }

        /* Grid Matrix (Punch Card) */
        .matrix-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        .streak-val { font-size: 16px; font-weight: 500; }
        .grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
        }
        .dot {
            aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent; transition: all 0.3s ease;
        }
        .dot.filled { background: var(--text-main); border-color: var(--text-main); }
        .dot.missed { border-color: rgba(255, 59, 48, 0.3); }

        /* Quests */
        .quest-item {
            display: flex; align-items: center; gap: 16px; padding: 14px 0;
            border-bottom: 1px solid var(--border); transition: opacity 0.3s ease;
        }
        .quest-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .circle-check {
            width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--text-muted);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .quest-item.done .circle-check {
            background: var(--text-main); border-color: var(--text-main);
        }
        /* SVG Checkmark */
        .circle-check svg { width: 12px; height: 12px; fill: none; stroke: var(--bg); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0; }
        .quest-item.done .circle-check svg { opacity: 1; }

        .quest-text {
            font-size: 15px; font-weight: 400; color: var(--text-main); transition: all 0.3s;
        }
        .quest-item.done .quest-text {
            color: var(--text-muted); text-decoration: line-through;
        }

        /* Progress Line */
        .progress-bar {
            width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 16px; border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--text-main); transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>

    <div class="ambient-aura" id="aura"></div>

    <div class="container">
        
        <div class="level-block">
            <span class="label">Текущий уровень</span>
            <div class="level-number" id="levelNum">0</div>
            <div class="level-subtitle" id="systemStatus">Синхронизация...</div>
        </div>

        <button class="btn-init" id="initBtn" onclick="app.initDay()">Запустить день</button>

        <div class="card" id="questCard">
            <span class="label">Протокол действий</span>
            <div id="questList"></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="card">
            <div class="matrix-header">
                <span class="label" style="margin:0;">Матрица (28 дней)</span>
                <span class="streak-val" id="streakCount">Серия: 0</span>
            </div>
            <div class="grid" id="matrixGrid"></div>
        </div>

    </div>

    <script>
        const DOB = new Date(2003, 1, 10); // 10 февраля 2003
        
        // База задач без шелухи
        const TASKS = [
            "Выпить 500мл воды", "Физическая активность (15 мин)", "Очистить рабочее пространство",
            "Чтение (15 страниц)", "Фокус-сессия без телефона", "Спланировать завтрашний день",
            "Сделать растяжку", "Выйти на свежий воздух", "Контроль финансов (записать траты)"
        ];

        const app = {
            state: {
                streak: 0,
                lastVisit: null,
                history: [], // Формат: "YYYY-MM-DD"
                tasks: [],
                progress: 0
            },

            start() {
                this.loadState();
                this.checkDate();
                this.render();
            },

            loadState() {
                const data = localStorage.getItem('systemState_v2');
                if (data) {
                    this.state = JSON.parse(data);
                } else {
                    // Первая загрузка - создаем чистую историю на 28 дней назад
                    this.state.history = [];
                }
            },

            saveState() {
                localStorage.setItem('systemState_v2', JSON.stringify(this.state));
            },

            getToday() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            },

            getMidnight(d) { 
                return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); 
            },

            checkDate() {
                const today = this.getToday();
                if (this.state.lastVisit !== today) {
                    // Проверка пропусков
                    if (this.state.lastVisit) {
                        const lastTime = this.getMidnight(new Date(this.state.lastVisit));
                        const todayTime = this.getMidnight(new Date());
                        const diff = Math.floor((todayTime - lastTime) / (1000 * 60 * 60 * 24));
                        
                        if (diff > 1) {
                            this.state.streak = 0; // Сброс серии
                        }
                    }

                    // Генерация новых задач
                    const shuffled = [...TASKS].sort(() => 0.5 - Math.random());
                    this.state.tasks = shuffled.slice(0, 3).map(t => ({ text: t, done: false }));
                    this.state.progress = 0;
                    this.saveState();
                }
            },

            initDay() {
                if (this.state.progress > 0 || this.state.lastVisit === this.getToday()) return;

                this.haptic(50);
                const today = this.getToday();
                
                this.state.streak += 1;
                this.state.lastVisit = today;
                this.state.progress = 25; // 25% за вход
                
                // Обновляем историю
                this.state.history.push(today);
                if (this.state.history.length > 28) this.state.history.shift();

                this.saveState();
                this.render();
            },

            toggleTask(index) {
                if (this.state.progress === 0) return; // Нельзя кликать до запуска

                this.haptic(20);
                const task = this.state.tasks[index];
                task.done = !task.done;

                // Пересчет прогресса
                let p = 25;
                let doneCount = 0;
                this.state.tasks.forEach(t => { if(t.done) { p += 25; doneCount++; } });
                this.state.progress = p;

                this.saveState();
                this.renderTasks();
                this.updateUIStatus();
            },

            haptic(ms) {
                if (navigator.vibrate) navigator.vibrate(ms);
            },

            render() {
                // Уровень
                const days = Math.floor((this.getMidnight(new Date()) - this.getMidnight(DOB)) / (1000 * 60 * 60 * 24));
                document.getElementById('levelNum').textContent = days;

                // Кнопка
                const btn = document.getElementById('initBtn');
                if (this.state.progress > 0) {
                    btn.textContent = "Система активна";
                    btn.classList.add('active');
                } else {
                    btn.textContent = "Запустить день";
                    btn.classList.remove('active');
                }

                // Серия
                document.getElementById('streakCount').textContent = `Серия: ${this.state.streak}`;

                this.renderTasks();
                this.renderMatrix();
                this.updateUIStatus();
            },

            renderTasks() {
                const list = document.getElementById('questList');
                list.innerHTML = '';
                
                this.state.tasks.forEach((t, i) => {
                    const el = document.createElement('div');
                    el.className = `quest-item ${t.done ? 'done' : ''}`;
                    el.onclick = () => this.toggleTask(i);
                    el.innerHTML = `
                        <div class="circle-check">
                            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <span class="quest-text">${t.text}</span>
                    `;
                    list.appendChild(el);
                });

                document.getElementById('progressFill').style.width = `${this.state.progress}%`;
            },

            renderMatrix() {
                const grid = document.getElementById('matrixGrid');
                grid.innerHTML = '';
                
                const todayTime = this.getMidnight(new Date());
                
                // Рендерим 28 дней (4 недели)
                for (let i = 27; i >= 0; i--) {
                    const d = new Date(todayTime - (i * 24 * 60 * 60 * 1000));
                    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    
                    if (this.state.history.includes(dateStr)) {
                        dot.classList.add('filled');
                    }
                    grid.appendChild(dot);
                }
            },

            updateUIStatus() {
                const statusEl = document.getElementById('systemStatus');
                const aura = document.getElementById('aura');

                if (this.state.progress === 0) {
                    statusEl.textContent = "Ожидание инициализации...";
                    aura.classList.remove('completed');
                } else if (this.state.progress < 100) {
                    statusEl.textContent = `В процессе. Выполнено: ${this.state.progress}%`;
                    aura.classList.remove('completed');
                } else {
                    statusEl.textContent = "Цикл завершен. Идеальный день.";
                    aura.classList.add('completed');
                }
            }
        };

        app.start();

    </script>
</body>
</html>
