<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Дни</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 20px;
            color: #555;
            margin-bottom: 5px;
            font-weight: normal;
        }
        .days-alive {
            font-size: 56px;
            font-weight: bold;
            color: #a18cd1;
            margin: 0 0 10px 0;
            line-height: 1;
        }
        .streak {
            font-size: 16px;
            color: #777;
            margin-bottom: 30px;
        }
        .streak-count {
            font-weight: bold;
            color: #f68084;
        }
        button {
            background: #a18cd1;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
        }
        button:hover {
            background: #8e75c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(161, 140, 209, 0.6);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Я живу уже</h1>
        <div class="days-alive" id="daysAlive">0</div>
        <div class="streak">
            Дней подряд: <span class="streak-count" id="streakCount">0</span> 🔥
        </div>
        <button id="checkInBtn" onclick="checkIn()">Отметиться сегодня</button>
    </div>

    <script>
        // Дата рождения: 10 февраля 2003 (месяцы в JS начинаются с 0, поэтому 1 = февраль)
        const dob = new Date(2003, 1, 10);
        
        // Элементы интерфейса
        const daysAliveEl = document.getElementById('daysAlive');
        const streakCountEl = document.getElementById('streakCount');
        const checkInBtn = document.getElementById('checkInBtn');

        // Функция обнуления времени для точного подсчета дней
        function getMidnight(date) {
            return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        }

        // Подсчет прожитых дней
        function updateDaysAlive() {
            const today = new Date();
            const diffTime = getMidnight(today) - getMidnight(dob);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            daysAliveEl.textContent = diffDays;
        }

        // Обновление интерфейса серии кликов (стрика)
        function updateStreakUI() {
            let streak = parseInt(localStorage.getItem('myStreak')) || 0;
            let lastVisit = localStorage.getItem('lastVisitDate');
            let todayStr = new Date().toDateString();

            streakCountEl.textContent = streak;

            if (lastVisit === todayStr) {
                checkInBtn.textContent = "Вы уже отметились!";
                checkInBtn.disabled = true;
            } else {
                checkInBtn.textContent = "Отметиться сегодня";
                checkInBtn.disabled = false;
            }
        }

        // Логика кнопки "Отметиться"
        function checkIn() {
            let streak = parseInt(localStorage.getItem('myStreak')) || 0;
            let lastVisit = localStorage.getItem('lastVisitDate');
            let today = new Date();
            let todayStr = today.toDateString();

            if (lastVisit !== todayStr) {
                if (lastVisit) {
                    let lastDate = new Date(lastVisit);
                    let dayDiff = Math.floor((getMidnight(today) - getMidnight(lastDate)) / (1000 * 60 * 60 * 24));
                    
                    if (dayDiff === 1) {
                        streak++; // Если зашли на следующий день, увеличиваем серию
                    } else if (dayDiff > 1) {
                        streak = 1; // Если пропустили день, сбрасываем счетчик
                    }
                } else {
                    streak = 1; // Первый в истории клик
                }

                localStorage.setItem('myStreak', streak);
                localStorage.setItem('lastVisitDate', todayStr);
                updateStreakUI();
            }
        }

        // Запуск при загрузке
        updateDaysAlive();
        updateStreakUI();
    </script>
</body>
</html>
